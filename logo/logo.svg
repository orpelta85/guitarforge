           M60 26C80 26,92 42,90 58C88 73,72 87,60 95C48 87,32 73,30 58C28 42,40 26,60 26Z"/>

  <!-- GUITAR — small tracked category label -->
  <text x="126" y="45"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="12" font-weight="400" fill="#71717A" letter-spacing="9">GUITAR</text>

  <!-- FORGE — dominant brand word -->
  <text x="123" y="98"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="54" font-weight="900" fill="#18181B" letter-spacing="-1">FORGE</text>

